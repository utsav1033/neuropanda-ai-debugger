services:
  # ── Backend ──────────────────────────────────────
  - type: web
    name: neuropanda-backend
    runtime: python
    rootDir: backend
    pythonVersion: "3.11.9"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_API_KEY
        sync: false          # Set manually in Render dashboard
      - key: REDIS_URL
        sync: false          # Optional: Redis Cloud connection string
      - key: CHROMA_PATH
        value: ./data/chroma_index

  # ── Frontend ─────────────────────────────────────
  - type: web
    name: neuropanda-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: neuropanda-backend
          type: web
          property: host          # Automatically uses the backend's Render URL
