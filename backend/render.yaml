services:
  - type: web
    name: neuropanda-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_API_KEY
        sync: false          # Set manually in Render dashboard
      - key: REDIS_URL
        sync: false          # Optional: paste Redis Cloud URL here if you have one
      - key: CHROMA_PATH
        value: ./data/chroma_index